# ============================================================
# ZALA FRONTEND — CI/CD Pipeline → Vercel
# ============================================================

name: 📱 Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ════════════════════════════════════════
  # 🔍 Lint & Type Check
  # ════════════════════════════════════════
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx expo lint 2>/dev/null || true
        continue-on-error: true
      - run: npx tsc --noEmit
        continue-on-error: true

  # ════════════════════════════════════════
  # 🌐 Build Web + Deploy Vercel
  # ════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci

      - name: 🌐 Build web (dist)
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: 🔧 Install Vercel CLI
        run: npm i -g vercel@latest

      # Production deploy (main branch)
      - name: 🚀 Deploy Production
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Preview deploy (PR / develop)
      - name: 🔍 Deploy Preview
        if: github.ref != 'refs/heads/main' || github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
